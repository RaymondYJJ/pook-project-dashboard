services:
  db:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16-alpine}
    container_name: pook-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pook_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pook_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pook-dashboard-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pook_dashboard?schema=public
      AUTH_SECRET: replace-with-a-long-random-secret
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/uploads

volumes:
  postgres_data:
  app_uploads:
